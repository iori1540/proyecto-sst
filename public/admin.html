<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Panel Admin SST</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Segoe UI, sans-serif; background: #f0f4f8; min-height: 100vh; }
header { background: #CC0000; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 17px; font-weight: 600; }
.btn-salir { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.nav-tabs { background: white; border-bottom: 1px solid #e0e7ef; display: flex; padding: 0 2rem; }
.nav-tab { padding: 14px 20px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }
.nav-tab.activo { color: #CC0000; border-bottom-color: #CC0000; }
.contenido { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
.seccion { display: none; } .seccion.activa { display: block; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: white; border-radius: 12px; padding: 1.2rem; text-align: center; border: 1px solid #e0e7ef; }
.stat-num { font-size: 32px; font-weight: 700; color: #CC0000; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; }
.tabla-wrap { background: white; border-radius: 12px; border: 1px solid #e0e7ef; overflow-x: auto; margin-bottom: 1.5rem; }
.tabla-header { padding: 1rem 1.5rem; border-bottom: 1px solid #e0e7ef; display: flex; justify-content: space-between; align-items: center; }
.tabla-header h3 { font-size: 16px; color: #111; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8fafc; padding: 10px 14px; text-align: left; font-weight: 600; color: #555; border-bottom: 1px solid #e0e7ef; white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid #f0f4f8; color: #333; vertical-align: middle; }
tr:hover td { background: #f8fafc; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-baja { background: #e6f4ea; color: #2e7d32; }
.badge-media { background: #fff8e1; color: #f57f17; }
.badge-alta { background: #fff3e0; color: #e65100; }
.badge-critica { background: #fdecea; color: #c62828; }
.badge-admin { background: #e8eaf6; color: #CC0000; }
.badge-trabajador { background: #f3f4f6; color: #555; }
.btn-sm { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
.btn-danger { background: #fdecea; color: #c62828; }
.btn-primary { background: #e8eaf6; color: #CC0000; }
.btn-export { background: #CC0000; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.sin-datos { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
.filtros { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.filtros select { padding: 8px 12px; border: 1px solid #ccd6e0; border-radius: 8px; font-size: 13px; outline: none; }
.foto-mini { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; }
.sin-foto { color: #ccc; font-size: 11px; }
</style>
</head>
<body>
<header>
<h1>Panel Admin SST</h1>
<button class="btn-salir" onclick="salir()">Cerrar sesion</button>
</header>
<nav class="nav-tabs">
<div class="nav-tab activo" onclick="irTab('resumen')">Resumen</div>
<div class="nav-tab" onclick="irTab('incidentes')">Incidentes</div>
<div class="nav-tab" onclick="irTab('usuarios')">Usuarios</div>
</nav>
<div class="contenido">
<div class="seccion activa" id="sec-resumen">
<div class="stats-grid">
<div class="stat-card"><div class="stat-num" id="s-total">-</div><div class="stat-label">Total</div></div>
<div class="stat-card"><div class="stat-num" style="color:#e53935" id="s-criticos">-</div><div class="stat-label">Criticos</div></div>
<div class="stat-card"><div class="stat-num" style="color:#fb8c00" id="s-altos">-</div><div class="stat-label">Altos</div></div>
<div class="stat-card"><div class="stat-num" style="color:#43a047" id="s-bajos">-</div><div class="stat-label">Bajos</div></div>
<div class="stat-card"><div class="stat-num" style="color:#CC0000" id="s-usuarios">-</div><div class="stat-label">Usuarios</div></div>
</div>
</div>
<div class="seccion" id="sec-incidentes">
<div class="filtros">
<select id="filtro-severidad" onchange="filtrarIncidentes()">
<option value="">Todas severidades</option>
<option value="critica">Critica</option>
<option value="alta">Alta</option>
<option value="media">Media</option>
<option value="baja">Baja</option>
</select>
<select id="filtro-tipo" onchange="filtrarIncidentes()">
<option value="">Todos tipos</option>
<option value="accidente">Accidente</option>
<option value="casi-accidente">Casi accidente</option>
<option value="condicion-insegura">Condicion insegura</option>
<option value="otro">Otro</option>
</select>
<button class="btn-export" onclick="exportarCSV()">Exportar CSV</button>
</div>
<div class="tabla-wrap">
<div class="tabla-header"><h3>Todos los Incidentes</h3><button class="btn-export" onclick="cargarIncidentes()" style="font-size:12px;padding:6px 12px;">Actualizar</button></div>
<div id="tabla-incidentes"><div class="sin-datos">Cargando...</div></div>
</div>
</div>
<div class="seccion" id="sec-usuarios">
<div class="tabla-wrap">
<div class="tabla-header"><h3>Usuarios Registrados</h3><button class="btn-export" onclick="cargarUsuarios()" style="font-size:12px;padding:6px 12px;">Actualizar</button></div>
<div id="tabla-usuarios"><div class="sin-datos">Cargando...</div></div>
</div>
</div>
</div>
<script>
const usuario = JSON.parse(localStorage.getItem("sst_usuario")||"null");
if(!usuario){alert("Solo administradores");window.location.href="/";}
let todosIncidentes=[];
function salir(){localStorage.removeItem("sst_usuario");window.location.href="/";}
function irTab(tab){
document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activa"));
document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("activo"));
document.getElementById("sec-"+tab).classList.add("activa");
["resumen","incidentes","usuarios"].forEach((t,i)=>{if(t===tab)document.querySelectorAll(".nav-tab")[i].classList.add("activo");});
if(tab==="incidentes")cargarIncidentes();
if(tab==="usuarios")cargarUsuarios();
}
async function cargarResumen(){
try{
const[rE,rU]=await Promise.all([fetch("/api/estadisticas").then(r=>r.json()),fetch("/api/admin/usuarios").then(r=>r.json())]);
document.getElementById("s-total").textContent=rE.total;
document.getElementById("s-usuarios").textContent=rU.usuarios.length;
const g=(a,v)=>(a.find(x=>x._id===v)||{}).count||0;
document.getElementById("s-criticos").textContent=g(rE.porSeveridad,"critica");
document.getElementById("s-altos").textContent=g(rE.porSeveridad,"alta");
document.getElementById("s-bajos").textContent=g(rE.porSeveridad,"baja");
}catch(e){console.error(e);}
}
async function cargarIncidentes(){
document.getElementById("tabla-incidentes").innerHTML="<div class='sin-datos'>Cargando...</div>";
try{const r=await fetch("/api/incidentes");const d=await r.json();todosIncidentes=d.incidentes;renderIncidentes(todosIncidentes);}
catch{document.getElementById("tabla-incidentes").innerHTML="<div class='sin-datos'>Error.</div>";}
}
function filtrarIncidentes(){
const s=document.getElementById("filtro-severidad").value;
const t=document.getElementById("filtro-tipo").value;
let l=todosIncidentes;
if(s)l=l.filter(i=>i.severidad===s);
if(t)l=l.filter(i=>i.tipo===t);
renderIncidentes(l);
}
function renderIncidentes(lista){
const el=document.getElementById("tabla-incidentes");
if(!lista.length){el.innerHTML="<div class='sin-datos'>No hay incidentes.</div>";return;}
const M=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
let h="<table><thead><tr><th>Titulo</th><th>Tipo</th><th>Area</th><th>Severidad</th><th>Reportado por</th><th>Fecha y Hora</th><th>Foto</th><th>Accion</th></tr></thead><tbody>";
lista.forEach(function(i){
const f=new Date(i.fecha);
const fecha=f.getDate()+" "+M[f.getMonth()]+" "+f.getFullYear();
const hora=f.getHours().toString().padStart(2,"0")+":"+f.getMinutes().toString().padStart(2,"0");
const foto=i.fotoUrl?"<a href='"+i.fotoUrl+"' target='_blank'><img src='"+i.fotoUrl+"' class='foto-mini'/></a>":"<span class='sin-foto'>Sin foto</span>";
h+="<tr><td><strong>"+i.titulo+"</strong><br><span style='color:#888;font-size:11px'>"+(i.descripcion||"").substring(0,50)+"...</span></td>";
h+="<td>"+i.tipo+"</td><td>"+i.area+"</td>";
h+="<td><span class='badge badge-"+i.severidad+"'>"+i.severidad+"</span></td>";
h+="<td>"+(i.usuarioNombre||"N/A")+"</td>";
h+="<td>"+fecha+"<br><span style='color:#888;font-size:11px'>"+hora+"</span></td>";
h+="<td>"+foto+"</td>";
h+="<td><button class='btn-sm btn-danger' onclick='eliminarIncidente(\""+i._id+"\")'>Eliminar</button></td></tr>";
});
h+="</tbody></table>";
el.innerHTML=h;
}
async function eliminarIncidente(id){
if(!confirm("Eliminar?"))return;
await fetch("/api/incidentes/"+id,{method:"DELETE"});
cargarIncidentes();
}
async function cargarUsuarios(){
document.getElementById("tabla-usuarios").innerHTML="<div class='sin-datos'>Cargando...</div>";
try{
const r=await fetch("/api/admin/usuarios");const d=await r.json();
if(!d.usuarios.length){document.getElementById("tabla-usuarios").innerHTML="<div class='sin-datos'>No hay usuarios.</div>";return;}
const M=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
let h="<table><thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Registro</th><th>Accion</th></tr></thead><tbody>";
d.usuarios.forEach(function(u){
const f=new Date(u.creado);
h+="<tr><td>"+u.nombre+"</td><td>"+u.correo+"</td>";
h+="<td><span class='badge badge-"+u.rol+"'>"+u.rol+"</span></td>";
h+="<td>"+f.getDate()+" "+M[f.getMonth()]+" "+f.getFullYear()+"</td>";
h+="<td>"+(u.rol!=="admin"?"<button class='btn-sm btn-primary' onclick='hacerAdmin(\""+u._id+"\")'>Hacer Admin</button>":"<span style='color:#888'>Admin</span>")+"</td></tr>";
});
h+="</tbody></table>";
document.getElementById("tabla-usuarios").innerHTML=h;
}catch{document.getElementById("tabla-usuarios").innerHTML="<div class='sin-datos'>Error.</div>";}
}
async function hacerAdmin(id){
if(!confirm("Dar permisos admin?"))return;
await fetch("/api/admin/usuarios/"+id+"/rol",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({rol:"admin"})});
cargarUsuarios();
}
function exportarCSV(){
if(!todosIncidentes.length){alert("No hay datos.");return;}
const M=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const filas=[["Titulo","Tipo","Area","Severidad","Reportado por","Fecha","Hora","Foto"]];
todosIncidentes.forEach(function(i){
const f=new Date(i.fecha);
filas.push([i.titulo,i.tipo,i.area,i.severidad,i.usuarioNombre||"N/A",f.getDate()+" "+M[f.getMonth()]+" "+f.getFullYear(),f.getHours().toString().padStart(2,"0")+":"+f.getMinutes().toString().padStart(2,"0"),i.fotoUrl||"Sin foto"]);
});
const csv="sep=;\n"+filas.map(r=>r.map(c=>'"'+c+'"').join(";")).join("\n");
const b=new Blob([csv],{type:"text/csv"});
const u=URL.createObjectURL(b);
const a=document.createElement("a");
a.href=u;a.download="incidentes_sst.csv";a.click();
}
cargarResumen();
</script>
</body>
</html>
